repos:
  - repo: local
    hooks:
      - id: gremlins-check
        name: Detect gremlins / unwanted Unicode characters
        entry: python3 -m tests.hooks.gremlins
        language: system
        types: [text]
      - id: align-tables
        name: align markdown tables
        entry: python3 -m tests.hooks.align_tables
        language: system
        files: \.md$
        exclude: /copilot-instructions\.md
      - id: check-zsh-compat
        name: Check shell-sourced scripts for zsh compatibility
        entry: python3 -m tests.hooks.check_zsh_compat
        language: system
        files: \.assets/config/bash_cfg/.*\.sh$
        types: [file]
      - id: bats-tests
        name: Run bats unit tests for changed files
        entry: python3 -m tests.hooks.run_bats
        language: system
        types: [file]
        pass_filenames: true
      - id: pester-tests
        name: Run Pester unit tests for changed files
        entry: python3 -m tests.hooks.run_pester
        language: system
        types: [file]
        pass_filenames: true
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-executables-have-shebangs
      - id: check-shebang-scripts-are-executable
      - id: end-of-file-fixer
      - id: mixed-line-ending
      - id: trailing-whitespace
        exclude: \.md$
  - repo: https://github.com/DavidAnson/markdownlint-cli2
    rev: v0.22.1
    hooks:
      - id: markdownlint-cli2
        files: \.md$
        exclude: /copilot-instructions\.md
  - repo: https://github.com/scop/pre-commit-shfmt
    rev: v3.13.1-1
    hooks:
      - id: shfmt
        exclude: \.zsh$
  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.11.0.1
    hooks:
      - id: shellcheck
        args: ["--severity=warning"]
        exclude: \.zsh$
