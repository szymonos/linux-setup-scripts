name: Preflight Checks

on:
  pull_request:

jobs:
  preflight_checks:
    name: "pre-commit hooks"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Fetch base branch
        run: git fetch origin ${{ github.event.pull_request.base.ref }} --depth=1

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.11.6"
          enable-cache: "true"
          cache-dependency-glob: "uv.lock"

      - name: Sync uv virtual environment
        run: |
          uv sync --frozen --extra docs --compile-bytecode

      - name: Install Pester module
        shell: pwsh
        run: |
          Install-Module -Name Pester -RequiredVersion 5.6.0 -Repository PSGallery -Scope CurrentUser -Force -SkipPublisherCheck

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Build mkdocs documentation
        run: |
          uv run --frozen --extra docs mkdocs build

      - name: Run pre-commit hooks
        uses: j178/prek-action@v2
        with:
          extra-args: --from-ref "origin/${{ github.event.pull_request.base.ref }}" --to-ref HEAD
