"$schema" = 'https://starship.rs/config-schema.json'
# Starship port of omp_nerd theme.
# Matches oh-my-posh nerd.omp.json: Nerd Font icons, diamond-style path badge,
# OS icon, and nerd symbols throughout.
# Right prompt (right_format) requires zsh, fish, or bash+ble.sh.

format = """\
$python\
$os\
$cmd_duration\
$character\
$username\
$directory\
$git_branch\
$git_status\
$shell"""

right_format = '$kubernetes'

add_newline = false

# -- Arrow prompt symbol -------------------------------------------------------
[character]
success_symbol = '[ÔåÆ](bold fg:#23D18B)'
error_symbol   = '[ÔåÆ](bold fg:#F14C4C)'

# -- Execution time: [123ms] ---------------------------------------------------
[cmd_duration]
min_time          = 1
show_milliseconds = true
format            = '[\[](fg:#CCCCCC)[$duration](fg:#F5F543)[\]](fg:#CCCCCC) '

# -- Path: pill/badge with blue background (diamond style) --------------------
# OMP uses leading_diamond + background + trailing_diamond.
# Starship replicates this with powerline arc characters (Nerd Fonts U+E0B6/E0B4).
[directory]
style             = 'bold fg:white bg:#3B8EEA'
format            = '[¯é│¯é▓](fg:#3B8EEA)[$path ](bold fg:white bg:#3B8EEA)[¯é░¯é▒](fg:#3B8EEA) '
truncation_length = 1
truncate_to_repo  = false

# -- Git: nerd font branch icon, purple; orange status indicators -------------
[git_branch]
style  = 'bold fg:#D4AAFC'
symbol = '¯£Ñ '
format = '[$symbol$branch]($style) '

[git_status]
style     = 'fg:#FF9248'
format    = '[$all_status$ahead_behind]($style) '
modified  = '!'
staged    = '+'
deleted   = '-'
renamed   = '┬╗'
untracked = '?'
conflicted = '~'
ahead    = 'Ôåæ${count}'
behind   = 'Ôåô${count}'
diverged = 'Ôåò'

# -- Kubernetes (right prompt): ÔÄê context::namespace --------------------------
[kubernetes]
style    = 'fg:#2E6CE6'
symbol   = 'ÔÄê '
format   = '[$symbol$context([::$namespace](italic $style))]($style)'
disabled = false

# -- OS icon: cyan (matches OMP os segment; WSL color change not replicable) --
[os]
style    = 'fg:#26C6DA'
format   = '[$symbol]($style)'
disabled = false

[python]
style  = 'fg:#23D18B'
symbol = "¯êÁ "
format = '\([$virtualenv]($style)\) '

# -- Shell indicator: $/%/ÔØ¡ in green ------------------------------------------
[shell]
style                = 'fg:#23D18B'
bash_indicator       = '\$'
zsh_indicator        = '%'
powershell_indicator = 'ÔØ¡'
fish_indicator       = 'ÔØ¡'
format               = '[$indicator ]($style)'
disabled             = false

# -- SSH / root: yellow username on SSH, bold red when root -------------------
# OMP nerd shows  icon on SSH; starship shows username instead.
[username]
style_root  = 'bold fg:#FF6666'
style_user  = 'fg:#FFE082'
format      = '[$user ]($style)'
show_always = false

# -- Suppress unused default modules ------------------------------------------
[hostname]
disabled = true

[sudo]
disabled = true

